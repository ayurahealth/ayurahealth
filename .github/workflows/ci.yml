name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security Audit
      run: npm audit --audit-level=high

    - name: Build
      run: npm run build
      env:
        # Define any dummy environment variables if build requires them
        # NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy
        # RAZORPAY_KEY_SECRET: dummy
        # STRIPE_SECRET_KEY: dummy
        NEXT_TELEMETRY_DISABLED: 1

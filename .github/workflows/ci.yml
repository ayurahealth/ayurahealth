name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

    - name: Security Audit
      run: npm audit --audit-level=high

    - name: Lint
      run: npm run lint

    - name: SEO Guard
      run: npm run seo:guard

    - name: Type Check
      run: npx tsc --noEmit

    - name: Auth Guard (production safety)
      run: node scripts/auth-guard.mjs
      env:
        VERCEL_ENV: production
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_dummy
        CLERK_SECRET_KEY: sk_dummy_test
        NEXT_PUBLIC_CLERK_FRONTEND_API: clerk.ayura.ai

    - name: Build
      run: npm run build
      env:
        # Dummy values for build-time resolution
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
        CLERK_SECRET_KEY: sk_test_dummy
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        RAZORPAY_KEY_ID: rzp_test_dummy
        RAZORPAY_KEY_SECRET: dummy_secret
        NEXT_TELEMETRY_DISABLED: 1
        PRISMA_SKIP_POSTINSTALL_GENERATE: 1

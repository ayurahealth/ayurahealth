name: SEO Monitor

on:
  schedule:
    # Weekly on Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  live-seo-check:
    name: Live SEO Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check homepage, robots, and sitemap are reachable
        run: |
          set -euo pipefail
          curl -fsS -I https://ayurahealth.com > /tmp/home.headers
          curl -fsS https://ayurahealth.com/robots.txt > /tmp/robots.txt
          curl -fsS https://ayurahealth.com/sitemap.xml > /tmp/sitemap.xml

      - name: Validate robots.txt and sitemap basics
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          robots = Path('/tmp/robots.txt').read_text()
          sitemap = Path('/tmp/sitemap.xml').read_text()

          checks = [
              ('User-agent: *' in robots, 'robots.txt missing User-agent rule'),
              ('Allow: /' in robots, 'robots.txt missing Allow: /'),
              ('Sitemap: https://ayurahealth.com/sitemap.xml' in robots, 'robots.txt missing sitemap URL'),
              ('<urlset' in sitemap, 'sitemap.xml missing <urlset> root'),
              ('https://ayurahealth.com/chat' in sitemap, 'sitemap.xml missing /chat'),
              ('https://ayurahealth.com/pricing' in sitemap, 'sitemap.xml missing /pricing'),
              ('https://ayurahealth.com/privacy' in sitemap, 'sitemap.xml missing /privacy'),
          ]

          errors = [msg for ok, msg in checks if not ok]
          if errors:
              for err in errors:
                  print(f'ERROR: {err}')
              raise SystemExit(1)

          print('robots.txt and sitemap.xml checks passed')
          PY

      - name: Validate homepage indexability and lang canonical redirect
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from urllib.request import Request, urlopen

          req = Request('https://ayurahealth.com', headers={'User-Agent': 'Mozilla/5.0'})
          with urlopen(req, timeout=20) as res:
            html = res.read().decode('utf-8', errors='ignore')
          robots = re.search(r'<meta name="robots" content="([^"]+)"', html, re.I)
          if not robots:
            raise SystemExit('ERROR: homepage missing robots meta tag')

          robots_value = robots.group(1).lower()
          if 'index' not in robots_value or 'follow' not in robots_value:
            raise SystemExit(f'ERROR: homepage robots meta not index/follow: {robots_value}')

          print('homepage robots meta checks passed')
          PY

      - name: Enforce raw redirect for lang query
        run: |
          set -euo pipefail
          status="$(curl -s -o /dev/null -w '%{http_code}' 'https://ayurahealth.com/?lang=ceb')"
          if [ "$status" != "301" ] && [ "$status" != "302" ] && [ "$status" != "307" ] && [ "$status" != "308" ]; then
            echo "ERROR: expected redirect status for /?lang=ceb, got $status"
            exit 1
          fi

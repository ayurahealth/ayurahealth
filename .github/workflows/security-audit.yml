name: Weekly Security Audit

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: node scripts/security-audit.js
        continue-on-error: true
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-audit-report
          path: .security-audit-report.json
          retention-days: 30
      
      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('.security-audit-report.json', 'utf-8'));
            
            const passCount = report.checks.filter(c => c.status === 'PASS').length;
            const failCount = report.checks.filter(c => c.status === 'FAIL').length;
            
            const comment = `## 🔐 Security Audit Results
            
**Status:** ${report.status === 'PASS' ? '✅ PASS' : '❌ FAIL'}
**Timestamp:** ${report.timestamp}

**Summary:**
- ✅ Passed: ${passCount}
- ❌ Failed: ${failCount}
- ⚠️ Warnings: ${report.warnings.length}

**Checks:**
${report.checks.map(c => `- ${c.status === 'PASS' ? '✅' : c.status === 'WARN' ? '⚠️' : '❌'} ${c.name}: ${c.status}${c.details ? ` - ${c.details}` : ''}`).join('\n')}

${report.vulnerabilities.length > 0 ? `**Vulnerabilities Found:**\n${report.vulnerabilities.map(v => `- ${v}`).join('\n')}` : ''}

${report.warnings.length > 0 ? `**Warnings:**\n${report.warnings.map(w => `- ${w}`).join('\n')}` : ''}
`;
            
            console.log(comment);
      
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔐 Security Audit Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Audit Failed*\n\nThe weekly security audit has detected issues that need attention.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

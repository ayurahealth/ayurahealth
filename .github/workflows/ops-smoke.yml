name: Ops Smoke Checks

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  smoke:
    name: Production smoke checks
    runs-on: ubuntu-latest
    steps:
      - name: Check homepage
        run: |
          set -euo pipefail
          curl -fsSL https://ayurahealth.com > /tmp/home.html
          grep -q "AyuraHealth" /tmp/home.html
          grep -q "Ancient Wisdom. Modern AI. Natural Healing." /tmp/home.html

      - name: Check health API readiness
        run: |
          set -euo pipefail
          curl -fsSL https://ayurahealth.com/api/health > /tmp/health.json
          grep -q '"status":"healthy"' /tmp/health.json
          grep -q '"ready":true' /tmp/health.json

      - name: Check Vedic Oracle API status
        run: |
          set -euo pipefail
          curl -fsSL https://ayurahealth.com/api/vedic/analyze > /tmp/vedic-status.json
          grep -q '"status":"operational"' /tmp/vedic-status.json
          grep -q '"service":"AyuraHealth Vedic Oracle"' /tmp/vedic-status.json


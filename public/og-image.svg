<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Premium Obsidian Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030a06" />
      <stop offset="100%" stop-color="#081a10" />
    </linearGradient>

    <!-- Delicate Mint Leaf -->
    <linearGradient id="leafLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(52,211,153,0.7)" />
      <stop offset="100%" stop-color="rgba(167,243,208,0.95)" />
    </linearGradient>

    <!-- Neural Grid Glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>

    <!-- Warm Gold for Neural Nodes -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="50%" stop-color="#d4a843" />
      <stop offset="100%" stop-color="#92620e" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Centered Content Group -->
  <g transform="translate(600, 315) scale(1.1)">
    <!-- Centered Logo (Leaf) -->
    <g transform="translate(-256, -256)">
      <!-- Neem Leaf -->
      <path d="M 130 400 C 90 280, 180 180, 310 130 C 270 240, 190 330, 130 400 Z" 
            fill="url(#leafLight)" opacity="0.85" filter="url(#glow)" />
      <!-- Spine -->
      <path d="M 130 400 Q 210 250 310 130" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round" />
      
      <!-- Neural Hub -->
      <circle cx="256" cy="220" r="14" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
      <circle cx="256" cy="220" r="7" fill="url(#gold)" />
    </g>

    <!-- Brand Text -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.02em">
      Ayura <tspan fill="#34d399" font-weight="500">Intelligence</tspan>
    </text>
    <text x="0" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(241,245,249,0.6)" text-anchor="middle" letter-spacing="0.05em">
      ANCIENT WISDOM · NEURAL SYNTHESIS
    </text>
  </g>
</svg>

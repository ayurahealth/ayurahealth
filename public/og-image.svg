<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Obsidian Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030a06" />
      <stop offset="100%" stop-color="#081a10" />
    </linearGradient>

    <!-- Delicate Mint Leaf -->
    <linearGradient id="leafLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(52,211,153,0.6)" />
      <stop offset="100%" stop-color="rgba(167,243,208,0.9)" />
    </linearGradient>

    <!-- Even Lighter Whisper Leaf -->
    <linearGradient id="leafWhisper" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(110,231,183,0.25)" />
      <stop offset="100%" stop-color="rgba(209,250,229,0.45)" />
    </linearGradient>

    <!-- Ghost Leaf -->
    <linearGradient id="leafGhost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(167,243,208,0.08)" />
      <stop offset="100%" stop-color="rgba(52,211,153,0.15)" />
    </linearGradient>

    <!-- Warm Gold for Neural Grid -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="50%" stop-color="#d4a843" />
      <stop offset="100%" stop-color="#92620e" />
    </linearGradient>

    <!-- Outer Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(52,211,153,0.5)" />
      <stop offset="50%" stop-color="rgba(209,250,229,0.2)" />
      <stop offset="100%" stop-color="rgba(52,211,153,0.5)" />
    </linearGradient>

    <filter id="aura" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
  </defs>

  <!-- Super-smooth Squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Subtle border ring -->
  <rect width="506" height="506" x="3" y="3" rx="110" fill="none" stroke="url(#ringGrad)" stroke-width="1" />

  <!-- ═══════ LAYER 1: Ghost/Ambient Leaves (Very Faint) ═══════ -->

  <!-- Ghost Leaf Far Left -->
  <path d="M 60 440 C 40 320, 100 200, 220 160 C 200 260, 120 350, 60 440 Z" 
        fill="url(#leafGhost)" filter="url(#aura)" />
  
  <!-- Ghost Leaf Far Right -->
  <path d="M 460 380 C 480 270, 400 170, 310 140 C 340 230, 400 310, 460 380 Z" 
        fill="url(#leafGhost)" filter="url(#aura)" />

  <!-- Ghost Leaf Top -->
  <path d="M 340 60 C 280 30, 190 70, 170 140 C 230 110, 300 90, 340 60 Z" 
        fill="url(#leafGhost)" filter="url(#aura)" />

  <!-- ═══════ LAYER 2: Whisper Leaves (Translucent Mid-Layer) ═══════ -->

  <!-- Whisper Neem Leaflet - Left -->
  <path d="M 95 410 C 70 310, 130 210, 240 170 C 210 260, 150 340, 95 410 Z" 
        fill="url(#leafWhisper)" stroke="rgba(167,243,208,0.3)" stroke-width="1" />
  
  <!-- Whisper Neem Leaflet - Right Upper -->
  <path d="M 420 300 C 440 220, 380 140, 290 110 C 320 190, 370 250, 420 300 Z" 
        fill="url(#leafWhisper)" stroke="rgba(167,243,208,0.3)" stroke-width="1" />

  <!-- Whisper Neem Leaflet - Top Left -->
  <path d="M 170 130 C 130 90, 170 50, 240 60 C 210 80, 185 105, 170 130 Z" 
        fill="url(#leafWhisper)" stroke="rgba(167,243,208,0.2)" stroke-width="1" />

  <!-- ═══════ LAYER 3: Hero Leaves (Vivid, Lite, Crisp) ═══════ -->

  <!-- Main Neem Leaf: Left Sweep -->
  <g filter="url(#glow)">
    <path d="M 130 400 C 90 280, 180 180, 310 130 C 270 240, 190 330, 130 400 Z" 
          fill="url(#leafLight)" opacity="0.7" />
    <!-- Spine -->
    <path d="M 130 400 Q 210 250 310 130" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round" />
    <!-- Delicate side veins -->
    <path d="M 155 340 Q 170 310 200 295 M 175 290 Q 195 265 225 250 M 200 240 Q 225 220 255 205 M 230 195 Q 255 175 280 165" 
          stroke="rgba(255,255,255,0.25)" stroke-width="1.2" fill="none" stroke-linecap="round" />
  </g>

  <!-- Main Neem Leaf: Right Sweep (mirrored angle) -->
  <g filter="url(#glow)">
    <path d="M 380 370 C 410 260, 340 160, 230 115 C 270 210, 340 300, 380 370 Z" 
          fill="url(#leafLight)" opacity="0.55" />
    <!-- Spine -->
    <path d="M 380 370 Q 300 230 230 115" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-linecap="round" />
    <!-- Delicate side veins -->
    <path d="M 362 310 Q 340 280 310 265 M 340 260 Q 315 235 290 220 M 315 210 Q 290 190 265 180" 
          stroke="rgba(255,255,255,0.2)" stroke-width="1.2" fill="none" stroke-linecap="round" />
  </g>

  <!-- Tiny Neem Leaflet accent top -->
  <g filter="url(#glow)">
    <path d="M 260 105 C 240 75, 270 50, 310 60 C 290 75, 272 90, 260 105 Z" 
          fill="url(#leafLight)" opacity="0.5" />
  </g>

  <!-- ═══════ LAYER 4: Golden AI Neural Network ═══════ -->
  <g filter="url(#nodeGlow)">
    
    <!-- Primary Hub (Center of Intersection - the "brain") -->
    <circle cx="256" cy="220" r="12" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="256" cy="220" r="6" fill="url(#gold)" />

    <!-- Neural Pathways radiating from center -->
    <!-- Down-Left -->
    <line x1="256" y1="220" x2="185" y2="305" stroke="url(#gold)" stroke-width="2" opacity="0.75"/>
    <circle cx="185" cy="305" r="5" fill="url(#gold)" />
    <line x1="185" y1="305" x2="145" y2="370" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="145" cy="370" r="3.5" fill="url(#gold)" opacity="0.7"/>

    <!-- Down-Right -->
    <line x1="256" y1="220" x2="330" y2="290" stroke="url(#gold)" stroke-width="2" opacity="0.75"/>
    <circle cx="330" cy="290" r="5" fill="url(#gold)" />
    <line x1="330" y1="290" x2="365" y2="345" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="365" cy="345" r="3.5" fill="url(#gold)" opacity="0.7"/>

    <!-- Up-Left -->
    <line x1="256" y1="220" x2="190" y2="160" stroke="url(#gold)" stroke-width="2" opacity="0.75"/>
    <circle cx="190" cy="160" r="5" fill="url(#gold)" />
    <line x1="190" y1="160" x2="155" y2="120" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="155" cy="120" r="3" fill="url(#gold)" opacity="0.6"/>

    <!-- Up-Right -->
    <line x1="256" y1="220" x2="335" y2="155" stroke="url(#gold)" stroke-width="2" opacity="0.75"/>
    <circle cx="335" cy="155" r="5" fill="url(#gold)" />
    <line x1="335" y1="155" x2="380" y2="115" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="380" cy="115" r="3" fill="url(#gold)" opacity="0.6"/>

    <!-- Up-Center -->
    <line x1="256" y1="220" x2="265" y2="130" stroke="url(#gold)" stroke-width="2" opacity="0.75"/>
    <circle cx="265" cy="130" r="4.5" fill="url(#gold)" />

    <!-- Cross-connections (secondary data paths) -->
    <line x1="185" y1="305" x2="330" y2="290" stroke="rgba(212,168,67,0.3)" stroke-width="1" stroke-dasharray="3 5"/>
    <line x1="190" y1="160" x2="335" y2="155" stroke="rgba(212,168,67,0.3)" stroke-width="1" stroke-dasharray="3 5"/>
    <line x1="190" y1="160" x2="265" y2="130" stroke="rgba(212,168,67,0.25)" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="335" y1="155" x2="265" y2="130" stroke="rgba(212,168,67,0.25)" stroke-width="1" stroke-dasharray="2 4"/>
  </g>

  <!-- ═══════ LAYER 5: Top-Level Polish ═══════ -->
  <!-- Tiny sparkle reflections -->
  <circle cx="310" cy="60" r="2" fill="#fff" opacity="0.85" filter="url(#nodeGlow)" />
  <circle cx="432" cy="130" r="1.5" fill="#fff" opacity="0.6" filter="url(#nodeGlow)" />
  <circle cx="90" cy="170" r="1.5" fill="#fff" opacity="0.5" filter="url(#nodeGlow)" />

</svg>

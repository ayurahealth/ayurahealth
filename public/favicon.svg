<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05100a" />
      <stop offset="100%" stop-color="#0a1c12" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8dfc8" />
      <stop offset="60%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#8c732b" />
    </linearGradient>
    <linearGradient id="neemGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4d2e" />
      <stop offset="40%" stop-color="#3d7a28" />
      <stop offset="100%" stop-color="#6abf8a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Forest Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1a4d2e" stroke-width="4" />
  <circle cx="256" cy="256" r="222" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="1.5" stroke-dasharray="6 8" />

  <!-- The Golden 'A' (Artistic Serif Path, centered) -->
  <g filter="url(#glow)" transform="translate(0, 5)">
    <!-- Main A shape -->
    <path d="M 230 110 L 282 110 L 380 390 L 325 390 L 305 320 L 207 320 L 187 390 L 132 390 Z M 223 270 L 289 270 L 256 160 Z" fill="url(#goldGrad)" opacity="0.95" />
    <!-- Serif flourishes -->
    <path d="M 120 390 L 199 390 M 313 390 L 392 390 M 218 110 L 294 110" stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round" />
  </g>

  <!-- Shimmering Artistic Neem Leaf woven over 'A' -->
  <g filter="url(#glow)">
    <!-- Primary sweeping leaf -->
    <path d="M 160 340 C 90 220, 190 150, 270 190 C 370 230, 460 140, 420 70 C 370 40, 290 120, 210 240 C 160 310, 140 330, 160 340 Z" fill="url(#neemGrad)" opacity="0.95" />
    <!-- Leaf central vein -->
    <path d="M 168 328 Q 230 220, 410 75" fill="none" stroke="#e8dfc8" stroke-width="3" opacity="0.35" />
    <!-- Lateral serrated veins -->
    <path d="M 235 210 L 265 170 M 270 185 L 305 150 M 310 155 L 345 125 M 345 130 L 375 105 M 375 110 L 400 90" stroke="#e8dfc8" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- Secondary subtle leaf wrapping the bottom right -->
  <g filter="url(#glow)">
    <path d="M 360 360 C 430 430, 310 490, 240 450 C 160 410, 70 470, 120 530 C 150 560, 220 480, 300 390 C 330 350, 350 350, 360 360 Z" fill="url(#neemGrad)" opacity="0.6" />
  </g>

</svg>

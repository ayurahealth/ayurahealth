<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#05100a"/>
  <g transform="translate(50, 50)">
    <!-- Outer leaf shape -->
    <path d="M0,-38 C14,-34 26,-22 27,-8 C29,8 22,24 12,32 C6,36 0,38 0,38 C0,38 -6,36 -12,32 C-22,24 -29,8 -27,-8 C-26,-22 -14,-34 0,-38 Z" fill="none" stroke="#6abf8a" stroke-width="1.2"/>
    <path d="M0,-38 C14,-34 26,-22 27,-8 C29,8 22,24 12,32 C6,36 0,38 0,38 C0,38 -6,36 -12,32 C-22,24 -29,8 -27,-8 C-26,-22 -14,-34 0,-38 Z" fill="#0d2010"/>
    <!-- Central vein — golden -->
    <line x1="0" y1="-38" x2="0" y2="38" stroke="#c9a84c" stroke-width="0.9" opacity="0.8"/>
    <!-- Fibonacci branching veins -->
    <g stroke="#6abf8a" stroke-width="0.5" fill="none" opacity="0.6">
      <path d="M0,-30 Q10,-26 18,-22"/>
      <path d="M0,-30 Q-10,-26 -18,-22"/>
      <path d="M0,-20 Q9,-16 16,-12"/>
      <path d="M0,-20 Q-9,-16 -16,-12"/>
      <path d="M0,-10 Q8,-7 13,-3"/>
      <path d="M0,-10 Q-8,-7 -13,-3"/>
      <path d="M0,0 Q7,3 11,8"/>
      <path d="M0,0 Q-7,3 -11,8"/>
      <path d="M0,10 Q5,13 8,18"/>
      <path d="M0,10 Q-5,13 -8,18"/>
      <path d="M0,20 Q4,23 6,27"/>
      <path d="M0,20 Q-4,23 -6,27"/>
    </g>
    <!-- Neural nodes on vein -->
    <g fill="#c9a84c">
      <circle cx="0" cy="-30" r="1.2"/>
      <circle cx="0" cy="-20" r="1"/>
      <circle cx="0" cy="-10" r="1.2"/>
      <circle cx="0" cy="0" r="1.5"/>
      <circle cx="0" cy="10" r="1.2"/>
      <circle cx="0" cy="20" r="1"/>
      <circle cx="0" cy="30" r="1.2"/>
    </g>
    <!-- Vein tip nodes -->
    <g fill="#6abf8a" opacity="0.7">
      <circle cx="18" cy="-22" r="1"/>
      <circle cx="-18" cy="-22" r="1"/>
      <circle cx="16" cy="-12" r="1"/>
      <circle cx="-16" cy="-12" r="1"/>
      <circle cx="13" cy="-3" r="1"/>
      <circle cx="-13" cy="-3" r="1"/>
      <circle cx="11" cy="8" r="1"/>
      <circle cx="-11" cy="8" r="1"/>
    </g>
    <!-- Golden ratio spiral -->
    <path d="M0,0 Q0,-14 14,-14 Q28,-14 28,0 Q28,22 0,22 Q-22,22 -22,-8 Q-22,-30 0,-30" fill="none" stroke="#c9a84c" stroke-width="0.4" stroke-dasharray="2,3" opacity="0.25"/>
    <!-- Sacred bindu center -->
    <circle cx="0" cy="0" r="3.5" fill="none" stroke="#c9a84c" stroke-width="0.7"/>
    <circle cx="0" cy="0" r="1.8" fill="#c9a84c"/>
    <circle cx="0" cy="0" r="0.7" fill="#05100a"/>
  </g>
</svg>

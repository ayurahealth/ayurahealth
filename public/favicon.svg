<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leafGradLeft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5a1b" />
      <stop offset="100%" stop-color="#6abf8a" />
    </linearGradient>
    <linearGradient id="leafGradRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d7a28" />
      <stop offset="100%" stop-color="#8cebaf" />
    </linearGradient>
  </defs>
  <!-- Central Stem -->
  <line x1="50" y1="90" x2="50" y2="20" stroke="#1a4d2e" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left Top Leaf -->
  <path d="M 50 20 C 35 30, 35 55, 50 60 C 45 40, 48 30, 50 20 Z" fill="url(#leafGradLeft)" />
  <!-- Right Top Leaf -->
  <path d="M 50 20 C 65 30, 65 55, 50 60 C 55 40, 52 30, 50 20 Z" fill="url(#leafGradRight)" />
  
  <!-- Left Mid Leaf -->
  <path d="M 50 40 C 30 45, 25 70, 50 75 C 40 60, 45 50, 50 40 Z" fill="url(#leafGradLeft)" />
  <!-- Right Mid Leaf -->
  <path d="M 50 40 C 70 45, 75 70, 50 75 C 60 60, 55 50, 50 40 Z" fill="url(#leafGradRight)" />

  <!-- Left Bottom Leaf -->
  <path d="M 50 60 C 30 65, 30 85, 50 85 C 40 75, 45 65, 50 60 Z" fill="url(#leafGradLeft)" />
  <!-- Right Bottom Leaf -->
  <path d="M 50 60 C 70 65, 70 85, 50 85 C 60 75, 55 65, 50 60 Z" fill="url(#leafGradRight)" />
</svg>

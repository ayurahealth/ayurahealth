<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background circle -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3d24" />
      <stop offset="100%" stop-color="#0a1f0f" />
    </radialGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d7a45" />
      <stop offset="100%" stop-color="#6abf8a" />
    </linearGradient>
    <!-- Gold gradient for A -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a" />
      <stop offset="100%" stop-color="#c9a84c" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- Subtle ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(106,191,138,0.2)" stroke-width="0.8" />

  <!-- Leaf — left -->
  <path d="M 50 22 C 34 28, 28 48, 36 62 C 38 55, 42 42, 50 30 Z"
        fill="url(#leafGrad)" opacity="0.9" filter="url(#glow)" />

  <!-- Leaf — right (lighter) -->
  <path d="M 50 22 C 66 28, 72 48, 64 62 C 62 55, 58 42, 50 30 Z"
        fill="#6abf8a" opacity="0.6" />

  <!-- A monogram -->
  <text x="50" y="74"
        font-family="Georgia, serif"
        font-size="32"
        font-weight="700"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="-1"
        filter="url(#glow)">A</text>

  <!-- Gold dot accent -->
  <circle cx="50" cy="17" r="2.5" fill="#c9a84c" opacity="0.8" />
</svg>
